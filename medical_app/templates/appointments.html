<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить пациента</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<h2>Приёмы</h2>

<form action="/appointments/add" method="post">
    <input name="date" placeholder="Дата">
    <input name="patient_id" placeholder="ID пациента">
    <input name="doctor_id" placeholder="ID врача">
    <button type="submit">Добавить</button>
</form>

<ul>
{% for a in appointments %}
    <li>{{a.id}} | {{a.date}} | Пациент {{a.patient_id}} | Врач {{a.doctor_id}}</li>
{% endfor %}
</ul>
